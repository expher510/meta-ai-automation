name: Meta AI Automation

on:
  repository_dispatch:
    types: [generate_video]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'The prompt to generate the video'
        required: true
        type: string
      webhook_url:
        description: 'n8n Webhook URL to send the result'
        required: true
        type: string
      cookies_b64:
        description: 'Base64 encoded Netscape HTTP Cookie string'
        required: true
        type: string
      job_id:                          
        description: 'Job ID to track the request'
        required: false
        type: string
      action:
        description: 'Action to perform (text_to_video, text_to_image, animate_generation, image_to_video)'
        required: false
        default: 'text_to_video'
        type: string
      image_url:
        description: 'Image URL for image_to_video action'
        required: false
        type: string
      aspect_ratio:
        description: 'Aspect ratio for image generation (1:1, 9:16, 16:9)'
        required: false
        default: '1:1'
        type: string

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Save Cookies to File (Workflow Dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          jq -r '.inputs.cookies_b64' "$GITHUB_EVENT_PATH" | base64 -d > cookies.txt

      - name: Save Cookies to File (Repository Dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          jq -r '.client_payload.cookies_b64' "$GITHUB_EVENT_PATH" | base64 -d > cookies.txt

      - name: Run Playwright Script (Workflow Dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python meta_ai_bot.py \
            --prompt "${{ github.event.inputs.prompt }}" \
            --webhook "${{ github.event.inputs.webhook_url }}" \
            --cookies cookies.txt \
            --job-id "${{ github.event.inputs.job_id }}" \
            --action "${{ github.event.inputs.action }}" \
            --image-url "${{ github.event.inputs.image_url }}" \
            --aspect-ratio "${{ github.event.inputs.aspect_ratio }}"

      - name: Run Playwright Script (Repository Dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          python meta_ai_bot.py \
            --prompt "${{ github.event.client_payload.prompt }}" \
            --webhook "${{ github.event.client_payload.webhook_url }}" \
            --cookies cookies.txt \
            --job-id "${{ github.event.client_payload.job_id }}" \
            --action "${{ github.event.client_payload.action }}" \
            --image-url "${{ github.event.client_payload.image_url }}" \
            --aspect-ratio "${{ github.event.client_payload.aspect_ratio }}"

      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
          if-no-files-found: ignore
